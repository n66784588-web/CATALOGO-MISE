<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo MISE</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#dcdcdc;
}

.libro{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:50px;
    box-shadow:0 0 40px rgba(0,0,0,0.15);
}

.titulo{
    text-align:center;
    font-size:30px;
    margin-bottom:60px;
}

.pagina{
    margin-bottom:80px;
}

.img-container{
    overflow:hidden;
}

.img-container img{
    width:100%;
    transition:transform 0.5s ease;
}

.img-container:hover img{
    transform:scale(1.8);
    cursor:zoom-in;
}

</style>
</head>

<body>

<div class="libro">

<div class="titulo">Catálogo MISE</div>

<!-- AQUI PONES TUS IMAGENES -->

<div class="pagina">
    <div class="img-container">
        <img src="img/12.jpg">
    </div>
</div>

<div class="pagina">
    <div class="img-container">
        <img src="img/18.jpg">
    </div>
</div>

<div class="pagina">
    <div class="img-container">
        <img src="img/25.jpg">
    </div>
</div>

<div class="pagina">
    <div class="img-container">
        <img src="img/40.jpg">
    </div>
</div>

<!-- SIGUE AGREGANDO TUS 52 IMÁGENES AQUI -->

</div>

</body>
</html>
