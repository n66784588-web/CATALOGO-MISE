<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo MISE</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#e5e5e5;
}

.libro{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:40px;
    box-shadow:0 0 30px rgba(0,0,0,0.15);
}

.pagina{
    margin-bottom:60px;
    page-break-after:always;
}

.img-container{
    overflow:hidden;
}

.img-container img{
    width:100%;
    transition:transform 0.5s ease;
}

.img-container:hover img{
    transform:scale(1.8);
    cursor:zoom-in;
}

.titulo{
    text-align:center;
    font-size:28px;
    margin-bottom:40px;
}

</style>
</head>

<body>

<div class="libro">

<div class="titulo">Catálogo MISE</div>

<div class="pagina">
    <div class="img-container">
        <img src="img/1.jpg">
    </div>
</div>

<div class="pagina">
    <div class="img-container">
        <img src="img/2.jpg">
    </div>
</div>

<div class="pagina">
    <div class="img-container">
        <img src="img/3.jpg">
    </div>
</div>

<!-- AGREGA MÁS PÁGINAS AQUÍ -->

</div>

</body>
</html>
