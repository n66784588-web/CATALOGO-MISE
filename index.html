<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo MISE</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:20px;
    background:#f2f2f2;
}

h1{
    text-align:center;
    margin-bottom:40px;
}

.catalogo{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
}

.producto{
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    text-align:center;
}

.img-container{
    overflow:hidden;
    border-radius:10px;
}

.img-container img{
    width:100%;
    height:300px;
    object-fit:cover;
    transition:transform 0.4s ease;
}

.img-container:hover img{
    transform:scale(1.6);
}

h3{
    margin:15px 0 5px;
}

.precio{
    font-weight:bold;
    color:#000;
    margin-top:5px;
}

</style>
</head>

<body>

<h1>Catálogo MISE</h1>

<div class="catalogo">

<div class="producto">
    <div class="img-container">
        <img src="img/12.jpg">
    </div>
    <h3>Modelo 12</h3>
    <div class="precio">$ ---</div>
</div>

<div class="producto">
    <div class="img-container">
        <img src="img/13.jpg">
    </div>
    <h3>Modelo 13</h3>
    <div class="precio">$ ---</div>
</div>

<div class="producto">
    <div class="img-container">
        <img src="img/14.jpg">
    </div>
    <h3>Modelo 14</h3>
    <div class="precio">$ ---</div>
</div>

</div>

</body>
</html>
